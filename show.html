<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>投稿履歴</title>
<style>
  body {
    font-family: "Hiragino Sans", "Segoe UI", sans-serif;
    background-color: #F7F8FA;
    margin: 0;
    padding: 0;
  }


  /* NAV MENU */
  .nav-header {
    background-color: #004C97;
    color: white;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 16px;
    height: 54px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.18);
    position: sticky;
    top: 0;
    z-index: 9999;
  }
  .nav-title {
    font-weight: bold;
    font-size: 15px;
    letter-spacing: 0.05em;
    color: white;
  }
  .nav-right {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  #navUsernameDisplay {
    font-weight: bold;
    font-size: 13px;
    color: #FFD700;
  }
  .nav-menu-btn {
    background: white;
    border: none;
    color: #004C97;
    font-size: 20px;
    width: 36px;
    height: 36px;
    border-radius: 8px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s, color 0.2s;
    line-height: 1;
  }
  .nav-menu-btn:hover { background: #E60012; color: white; }
  .nav-dropdown {
    position: fixed;
    top: 54px;
    right: 16px;
    background: white;
    border-radius: 14px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.18);
    min-width: 220px;
    padding: 10px 0;
    z-index: 9998;
    transform: translateY(-8px) scale(0.97);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.18s ease, transform 0.18s ease;
  }
  .nav-dropdown.open {
    opacity: 1;
    pointer-events: all;
    transform: translateY(0) scale(1);
  }
  .nav-dropdown a, .nav-dropdown button.nav-logout {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 11px 20px;
    font-size: 14px;
    color: #222;
    text-decoration: none;
    background: none;
    border: none;
    width: 100%;
    text-align: left;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.15s;
  }
  .nav-dropdown a:hover, .nav-dropdown button.nav-logout:hover {
    background: #F0F4FA;
  }
  .nav-dropdown a.active-page {
    color: #004C97;
    font-weight: bold;
    background: #EEF4FF;
  }
  .nav-dropdown .nav-divider {
    height: 1px;
    background: #eee;
    margin: 6px 0;
  }
  .nav-dropdown .nav-user-row {
    padding: 10px 20px 8px;
    font-size: 12px;
    color: #999;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .nav-dropdown .nav-user-name {
    font-weight: bold;
    color: #004C97;
    font-size: 14px;
  }
  .nav-backdrop {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 9997;
  }
  .nav-backdrop.open { display: block; }

  header {
    background-color: #004C97;
    color: white;
    text-align: center;
    padding: 15px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .header-left, .header-right {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  header a {
    color: #E60012;
    background: white;
    text-decoration: none;
    font-size: 14px;
    padding: 5px 10px;
    border-radius: 6px;
    transition: 0.2s;
  }
  header a:hover {
    background-color: #E60012;
    color: white;
  }

  #usernameDisplay {
    font-weight: bold;
    font-size: 14px;
    color: #FFD700;
  }

  h2 {
    text-align: center;
    margin-top: 20px;
    color: #004C97;
  }

  #filterArea {
    text-align: center;
    margin: 10px 0 20px;
  }

  #postContainer {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 20px;
    padding: 20px;
    width: 90%;
    max-width: 1000px;
    margin: auto;
  }

  .card {
    background-color: #fff;
    border-radius: 15px;
    padding: 20px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    border-left: 6px solid #E60012;
  }

  .card h3 {
    margin: 0 0 8px;
    color: #004C97;
    font-size: 18px;
  }

  .card p {
    margin: 4px 0;
    color: #333;
    font-size: 14px;
  }

  #reload {
    text-align: center;
    color: #555;
  }

  /* 更新インジケーター */
  #updateBar {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #004C97;
    color: white;
    padding: 10px 18px;
    border-radius: 30px;
    font-size: 13px;
    font-family: "Hiragino Sans", sans-serif;
    box-shadow: 0 4px 16px rgba(0,0,0,0.2);
    display: none;
    align-items: center;
    gap: 10px;
    z-index: 9000;
    transition: opacity 0.4s;
  }
  #updateBar.show { display: flex; }
  #updateBar.fade { opacity: 0; }
  .update-spinner {
    width: 14px; height: 14px;
    border: 2px solid rgba(255,255,255,0.4);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #updateBar.done .update-spinner { display: none; }
</style>
</head>
<body>

<header class="nav-header">
  <div class="nav-title">投稿履歴</div>
  <div class="nav-right">
    <span id="navUsernameDisplay"></span>
    <button class="nav-menu-btn" onclick="toggleNavMenu()" aria-label="メニュー">☰</button>
  </div>
</header>

<div class="nav-backdrop" id="navBackdrop" onclick="closeNavMenu()"></div>
<div class="nav-dropdown" id="navDropdown">
  <div class="nav-user-row">
    👤 <span class="nav-user-name" id="navMenuUsername"></span> さん
  </div>
  <div class="nav-divider"></div>
  <a href="index.html" >📝 新規投稿</a>
  <a href="show.html" class="active-page">📜 投稿履歴</a>
  <a href="statistick.html" >📊 統計情報</a>
  <a href="stampbook.html" >🎫 スタンプ帳</a>
  <div class="nav-divider"></div>
  <button class="nav-logout" onclick="logout()">🚪 ログアウト</button>
</div>

<script>
function toggleNavMenu() {
  document.getElementById("navDropdown").classList.toggle("open");
  document.getElementById("navBackdrop").classList.toggle("open");
}
function closeNavMenu() {
  document.getElementById("navDropdown").classList.remove("open");
  document.getElementById("navBackdrop").classList.remove("open");
}
(function() {
  const u = localStorage.getItem("username") || "";
  if (u) {
    const d1 = document.getElementById("navUsernameDisplay");
    const d2 = document.getElementById("navMenuUsername");
    if (d1) d1.textContent = u;
    if (d2) d2.textContent = u;
  }
})();
</script>

<h2>投稿一覧</h2>

<div id="filterArea">
  <label>月で絞り込み：</label>
  <select id="monthFilter">
    <option value="all">すべて表示</option>
  </select>
</div>

<p id="reload">読み込み中...</p>
<div id="postContainer"></div>

<!-- 更新インジケーター -->
<div id="updateBar">
  <div class="update-spinner"></div>
  <span id="updateMsg">最新データ取得中...</span>
</div>

<script src="nav.js"></script>
<script>initNav("投稿履歴");</script>
<script src="logs.js"></script>
<script>
const username = checkLogin();

const GAS_URL = "https://script.google.com/macros/s/AKfycbyWTr6ejDZKkaw9owEM8yLcl6-6w5pHeyk2hWdX6Lw1INNg5ZxuhvCx7PPfOmxWHC17/exec";
const CACHE_KEY = "tuts4_show_cache";

let allData = [];

// ===== 更新バー =====
function showUpdateBar(msg) {
  const bar = document.getElementById("updateBar");
  bar.classList.remove("fade", "done");
  bar.classList.add("show");
  document.getElementById("updateMsg").textContent = msg;
}

function finishUpdateBar(msg) {
  const bar = document.getElementById("updateBar");
  bar.classList.add("done");
  document.getElementById("updateMsg").textContent = msg;
  setTimeout(() => {
    bar.classList.add("fade");
    setTimeout(() => bar.classList.remove("show", "fade", "done"), 400);
  }, 1800);
}

// ===== カード描画 =====
function buildMonthFilter(data) {
  const months = [...new Set(data.map(d => String(d["時刻"]).slice(0, 7)))];
  const select = document.getElementById("monthFilter");
  const current = select.value;
  // 既存の選択肢（all以外）を削除して再構築
  while (select.options.length > 1) select.remove(1);
  months.forEach(m => {
    const o = document.createElement("option");
    o.value = m; o.textContent = m;
    select.appendChild(o);
  });
  if (current) select.value = current;
}

function renderCards(data) {
  const container = document.getElementById("postContainer");
  container.innerHTML = "";

  if (!data || data.length === 0) {
    document.getElementById("reload").textContent = "該当する投稿がありません。";
    return;
  }
  document.getElementById("reload").textContent = "";

  data.forEach(row => {
    const card = document.createElement("div");
    card.className = "card";

    const title = document.createElement("h3");
    title.textContent = String(row["路線"] || "");
    card.appendChild(title);

    const info = [
      ["ユーザー",   row["ユーザー名"]],
      ["発車時刻",   row["時刻"]],
      ["エリア",     row["エリア"]],
      ["区分",       row["区分"]],
      ["乗車駅",     row["乗車駅"]],
      ["種別",       row["種別"]],
      ["行先",       row["行先"]],
      ["車両形式",   row["車両形式"]],
      ["車番",       row["車番"]],
      ["備考",       row["メモ"]],
    ];

    info.forEach(([label, value]) => {
      if (value !== null && value !== undefined && String(value) !== "") {
        const p = document.createElement("p");
        p.innerHTML = `<strong>${label}：</strong>${String(value)}`;
        card.appendChild(p);
      }
    });

    container.appendChild(card);
  });
}

function applyMonthFilter() {
  const selected = document.getElementById("monthFilter").value;
  renderCards(selected === "all"
    ? allData
    : allData.filter(r => String(r["時刻"]).startsWith(selected))
  );
}

document.getElementById("monthFilter").addEventListener("change", applyMonthFilter);

// ===== ① キャッシュがあれば即表示 =====
const cached = localStorage.getItem(CACHE_KEY);
if (cached) {
  try {
    allData = JSON.parse(cached);
    buildMonthFilter(allData);
    renderCards(allData);
    document.getElementById("reload").textContent = "";
  } catch(e) {
    localStorage.removeItem(CACHE_KEY);
  }
}

// ===== ② バックグラウンドで最新データを取得 =====
showUpdateBar("最新データ取得中...");

fetch(GAS_URL)
  .then(res => {
    // レスポンスサイズが不明なのでXHRでプログレスを擬似表示
    return res.json();
  })
  .then(data => {
    data.reverse();

    // キャッシュと件数が変わっていれば更新
    const isSame = allData.length === data.length &&
      JSON.stringify(data[0]) === JSON.stringify(allData[0]);

    localStorage.setItem(CACHE_KEY, JSON.stringify(data));
    allData = data;
    buildMonthFilter(data);
    applyMonthFilter();

    finishUpdateBar(isSame ? "✅ 最新です" : `✅ ${data.length} 件に更新しました`);
  })
  .catch(() => {
    if (!cached) {
      document.getElementById("reload").textContent = "データ取得エラーが発生しました。";
    }
    finishUpdateBar("⚠️ 更新失敗（キャッシュを表示中）");
  });
</script>

</body>
</html>
