<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>投稿履歴</title>
<style>
  body {
    font-family: "Hiragino Sans", "Segoe UI", sans-serif;
    background-color: #F7F8FA;
    margin: 0;
    padding: 0;
  }


  

  header {
    background-color: #004C97;
    color: white;
    text-align: center;
    padding: 15px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .header-left, .header-right {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  header a {
    color: #E60012;
    background: white;
    text-decoration: none;
    font-size: 14px;
    padding: 5px 10px;
    border-radius: 6px;
    transition: 0.2s;
  }
  header a:hover {
    background-color: #E60012;
    color: white;
  }

  #usernameDisplay {
    font-weight: bold;
    font-size: 14px;
    color: #FFD700;
  }

  h2 {
    text-align: center;
    margin-top: 20px;
    color: #004C97;
  }

  #filterArea {
    text-align: center;
    margin: 10px 0 20px;
  }

  #postContainer {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 20px;
    padding: 20px;
    width: 90%;
    max-width: 1000px;
    margin: auto;
  }

  .card {
    background-color: #fff;
    border-radius: 15px;
    padding: 20px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    border-left: 6px solid #E60012;
  }

  .card h3 {
    margin: 0 0 8px;
    color: #004C97;
    font-size: 18px;
  }

  .card p {
    margin: 4px 0;
    color: #333;
    font-size: 14px;
  }

  #reload {
    text-align: center;
    color: #555;
  }
</style>
</head>
<body>



<h2>投稿一覧</h2>

<div id="filterArea">
  <label>月で絞り込み：</label>
  <select id="monthFilter">
    <option value="all">すべて表示</option>
  </select>
</div>

<p id="reload">読み込み中...</p>
<div id="postContainer"></div>

<script src="nav.js"></script>
<script>initNav("投稿履歴");</script>
<script src="logs.js"></script>
<script>
const username = checkLogin();

const GAS_URL = "https://script.google.com/macros/s/AKfycbyWTr6ejDZKkaw9owEM8yLcl6-6w5pHeyk2hWdX6Lw1INNg5ZxuhvCx7PPfOmxWHC17/exec";

let allData = [];

function renderCards(data) {
  const container = document.getElementById("postContainer");
  container.innerHTML = "";

  if (!data || data.length === 0) {
    document.getElementById("reload").textContent = "該当する投稿がありません。";
    return;
  }

  document.getElementById("reload").textContent = "";

  data.forEach(row => {
    const card = document.createElement("div");
    card.className = "card";

    const title = document.createElement("h3");
    title.textContent = String(row["路線"] || "");
    card.appendChild(title);

    const info = [
      ["ユーザー", row["ユーザー名"]],
      ["発車時刻", row["時刻"]],
      ["エリア", row["エリア"]],
      ["区分", row["区分"]],
      ["乗車駅", row["乗車駅"]],
      ["種別", row["種別"]],
      ["行先", row["行先"]],
      ["車両形式", row["車両形式"]],
      ["車番", row["車番"]],
      ["備考", row["メモ"]],
    ];

    info.forEach(([label, value]) => {
      if (value !== null && value !== undefined && String(value) !== "") {
        const p = document.createElement("p");
        p.innerHTML = `<strong>${label}：</strong>${String(value)}`;
        card.appendChild(p);
      }
    });

    container.appendChild(card);
  });
}

function applyMonthFilter() {
  const selected = document.getElementById("monthFilter").value;
  if (selected === "all") {
    renderCards(allData);
    return;
  }
  renderCards(allData.filter(r => String(r["時刻"]).startsWith(selected)));
}

fetch(GAS_URL)
  .then(res => res.json())
  .then(data => {
    data.reverse();
    allData = data;

    const months = [...new Set(data.map(d => String(d["時刻"]).slice(0, 7)))];
    const select = document.getElementById("monthFilter");

    months.forEach(m => {
      const o = document.createElement("option");
      o.value = m;
      o.textContent = m;
      select.appendChild(o);
    });

    select.addEventListener("change", applyMonthFilter);
    renderCards(data);
  })
  .catch(() => {
    document.getElementById("reload").textContent = "データ取得エラーが発生しました。";
  });
</script>

</body>
</html>
