<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>新規投稿</title>
  <style>
    body {
      font-family: "Hiragino Sans", "Segoe UI", sans-serif;
      background-color: #F7F8FA;
      margin: 0;
      padding: 0;
      color: #222;
    }


  

    header {
      background-color: #004C97;
      color: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }

    main {
      max-width: 600px;
      background: white;
      margin: 30px auto;
      padding: 20px 25px;
      border-radius: 15px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    h2 {
      text-align: center;
      color: #004C97;
      margin-bottom: 20px;
    }

    h3 {
      color: #004C97;
      font-size: 16px;
      margin-top: 20px;
    }

    input, select, button {
      width: 100%;
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
    }

    button {
      background-color: #004C97;
      color: white;
      border: none;
      font-weight: bold;
      margin-top: 25px;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background-color: #E60012;
    }

    small {
      font-size: 12px;
      color: #666;
    }

    /* ===== LOADING POPUP ===== */
    .loading-popup-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 10001;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(3px);
    }
    .loading-popup-overlay.show { display: flex; }
    .loading-popup {
      background: white;
      border-radius: 20px;
      padding: 36px 40px;
      text-align: center;
      box-shadow: 0 16px 48px rgba(0,0,0,0.2);
      animation: popupIn 0.3s ease both;
    }
    .loading-train {
      font-size: 48px;
      display: block;
      margin-bottom: 12px;
      animation: trainRun 0.8s ease-in-out infinite alternate;
    }
    @keyframes trainRun {
      from { transform: translateX(-8px); }
      to   { transform: translateX(8px); }
    }
    .loading-track {
      width: 120px;
      height: 4px;
      background: #eee;
      border-radius: 2px;
      margin: 0 auto 16px;
      overflow: hidden;
      position: relative;
    }
    .loading-track::after {
      content: '';
      position: absolute;
      left: -40%;
      width: 40%;
      height: 100%;
      background: #004C97;
      border-radius: 2px;
      animation: trackSlide 0.8s ease-in-out infinite;
    }
    @keyframes trackSlide {
      from { left: -40%; }
      to   { left: 100%; }
    }
    .loading-text {
      font-size: 14px;
      color: #555;
      font-family: "Hiragino Sans", sans-serif;
    }

    /* ===== STAMP POPUP ===== */
    .stamp-popup-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      z-index: 10000;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(3px);
    }
    .stamp-popup-overlay.show {
      display: flex;
    }
    .stamp-popup {
      background: #FAF6EF;
      border-radius: 20px;
      padding: 32px 28px 24px;
      max-width: 360px;
      width: 90%;
      text-align: center;
      box-shadow: 0 16px 48px rgba(0,0,0,0.25);
      animation: popupIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) both;
      position: relative;
      font-family: "Hiragino Sans", "Segoe UI", sans-serif;
    }
    @keyframes popupIn {
      from { transform: scale(0.7) translateY(40px); opacity: 0; }
      to   { transform: scale(1) translateY(0); opacity: 1; }
    }
    .stamp-popup-label {
      font-size: 13px;
      color: #999;
      letter-spacing: 0.08em;
      margin-bottom: 4px;
    }
    .stamp-popup-model {
      font-size: 22px;
      font-weight: bold;
      color: #004C97;
      margin-bottom: 20px;
    }
    .stamp-popup-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
      margin-bottom: 20px;
      max-height: 320px;
      overflow-y: auto;
      padding: 4px;
    }
    .stamp-popup-cell {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
    }
    .stamp-popup-cell .sp-label {
      font-size: 11px;
      color: #555;
    }
    .stamp-popup-cell.highlight .sp-label {
      color: #004C97;
      font-weight: bold;
    }
    .stamp-popup-cell.highlight .sp-circle {
      animation: stampBounce 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) 0.2s both;
    }
    @keyframes stampBounce {
      from { transform: scale(0) rotate(-20deg); opacity: 0; }
      to   { transform: scale(1) rotate(0deg); opacity: 1; }
    }
    .stamp-popup-btn {
      background: #004C97;
      color: white;
      border: none;
      padding: 10px 32px;
      border-radius: 20px;
      font-size: 14px;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.2s;
    }
    .stamp-popup-btn:hover { background: #E60012; }
    .stamp-popup-msg {
      font-size: 15px;
      font-weight: bold;
      margin-bottom: 16px;
    }
    .stamp-popup-msg.first { color: #E60012; }
    .stamp-popup-msg.again { color: #004C97; }

    /* ショートカット */
    .shortcut-bar {
      background: linear-gradient(135deg, #EEF4FF, #f0f8ff);
      border: 1.5px solid #c5d8f5;
      border-radius: 10px;
      padding: 12px 14px;
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .shortcut-bar label {
      font-size: 13px;
      font-weight: bold;
      color: #004C97;
      white-space: nowrap;
    }
    .shortcut-bar select {
      flex: 1;
      padding: 7px 10px;
      border: 1.5px solid #c5d8f5;
      border-radius: 7px;
      font-size: 13px;
      background: white;
    }
    .shortcut-bar a {
      font-size: 12px;
      color: #888;
      text-decoration: none;
      white-space: nowrap;
    }
    .shortcut-bar a:hover { color: #004C97; }

    .notice-card {
      background: #ffffff;
      border-radius: 12px;
      padding: 20px;
      margin: 20px auto;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      max-width: 600px;
    }

    .notice-title {
      text-align: left;
      color: #007bff;
      font-size: 20px;
      margin: 0 0 10px 0;
      font-weight: 600;
    }

    .notice-text {
      margin: 0;
      color: #333;
      font-size: 16px;
    }
  </style>
</head>
<body>



<main>
  <h2>投稿フォーム</h2>
  
  <label><h3>ユーザー名</h3></label>
  <input type="text" id="username" readonly>

  
  <label><h3>発車時刻</h3></label>
  <input type="datetime-local" id="departing_time">
  <button type="button" onclick="setCurrentDateTime()">🕓 現在時刻を入力</button>

  <!-- ショートカット選択 -->
  <div class="shortcut-bar">
    <label>⚡ ショートカット</label>
    <select id="shortcutSelect" onchange="applyShortcut()">
      <option value="">選択してください</option>
    </select>
    <a href="settings.html">設定 ›</a>
  </div>
  <select id="area"></select>

  <label><h3>区分</h3></label>
  <select id="type"></select>

  <label><h3>会社</h3></label>
  <select id="country"></select>

  <label><h3>路線</h3></label>
  <select id="route"></select>

  <label><h3>乗車駅</h3></label>
  <select id="station"></select>

  <label><h3>種別</h3></label>
  <select id="sujitype"></select>

  <label><h3>行先</h3></label>
  <select id="bound"></select>

  <label><h3>車両形式</h3></label>
  <select id="model"></select>

  <label><h3>車番</h3></label>
  <select id="number"></select>

  <label><h3>メモ</h3></label>
  <small>プルダウンにない場合はここに入力してください</small>
  <input type="text" id="memo">

  <div class="notice-card">
    <h2 class="notice-title">お知らせ</h2>
    <p class="desc" id="desc"></p>
  </div>

  <button onclick="upload()">🚆 投稿する</button>
</main>

<!-- ===== LOADING POPUP ===== -->
<div class="loading-popup-overlay" id="loadingPopupOverlay">
  <div class="loading-popup">
    <span class="loading-train">🚆</span>
    <div class="loading-track"></div>
    <div class="loading-text">送信中...</div>
  </div>
</div>

<!-- ===== STAMP POPUP ===== -->
<div class="stamp-popup-overlay" id="stampPopupOverlay">
  <div class="stamp-popup">
    <div class="stamp-popup-label">投稿完了 🚆</div>
    <div class="stamp-popup-model" id="spModelName"></div>
    <div class="stamp-popup-msg" id="spMsg"></div>
    <div class="stamp-popup-grid" id="spGrid"></div>
    <button class="stamp-popup-btn" onclick="closeStampPopup()">とじる</button>
  </div>
</div>

<script src="nav.js"></script>
<script>initNav("新規投稿");</script>
<script src="logs.js"></script>
<script src="scripts.js"></script>
<script>
  const username = checkLogin();

  // ===== ショートカット読み込み・適用 =====
  function loadShortcuts() {
    try { return JSON.parse(localStorage.getItem("tuts4_shortcuts") || "[]"); }
    catch { return []; }
  }

  function initShortcutSelect() {
    const sel = document.getElementById("shortcutSelect");
    const list = loadShortcuts();
    sel.innerHTML = '<option value="">⚡ 選択してください</option>';
    list.forEach((sc, i) => {
      const o = document.createElement("option");
      o.value = i;
      o.textContent = sc.name;
      sel.appendChild(o);
    });
  }

  // プルダウン選択後に各フィールドへ値を流し込む
  async function applyShortcut() {
    const idx = document.getElementById("shortcutSelect").value;
    if (idx === "") return;
    const sc = loadShortcuts()[parseInt(idx)];
    if (!sc) return;

    function setAndTrigger(id, val) {
      const el = document.getElementById(id);
      if (!el) return;
      el.value = val;
      el.dispatchEvent(new Event("change"));
    }

    // scripts.jsの連動プルダウンを順番にトリガー
    setAndTrigger("area", sc.area);
    setAndTrigger("type", sc.type);
    await wait(300);
    setAndTrigger("country", sc.company);
    await wait(300);
    setAndTrigger("route", sc.route);
    await wait(300);
    setAndTrigger("station",  sc.station);
    setAndTrigger("sujitype", sc.sujitype);
    setAndTrigger("bound",    sc.bound);

    // 選択をリセット（次回も使えるように）
    document.getElementById("shortcutSelect").value = "";
  }

  function wait(ms) { return new Promise(r => setTimeout(r, ms)); }

  // ページ読み込み時にショートカット一覧をセット
  initShortcutSelect();

  function showLoadingPopup() {
    document.getElementById("loadingPopupOverlay").classList.add("show");
  }
  function hideLoadingPopup() {
    document.getElementById("loadingPopupOverlay").classList.remove("show");
  }

  function closeStampPopup() {
    document.getElementById("stampPopupOverlay").classList.remove("show");
  }

  // Close on overlay click
  document.getElementById("stampPopupOverlay").addEventListener("click", function(e) {
    if (e.target === this) closeStampPopup();
  });

  const NUMBER_URL = "https://opensheet.elk.sh/1ZooIjdlOwsLZVjQv6KN53h4X2JYUyULYuJTuhbgk95s/number";
  const RIDES_URL  = "https://script.google.com/macros/s/AKfycbyWTr6ejDZKkaw9owEM8yLcl6-6w5pHeyk2hWdX6Lw1INNg5ZxuhvCx7PPfOmxWHC17/exec";

  const STAMP_COLORS = [
    "#C0392B","#1a5276","#1e8449","#7d3c98","#b7950b","#784212"
  ];

  function stampSVGSmall(color, ridden) {
    if (!ridden) {
      return `<svg width="56" height="56" viewBox="0 0 56 56">
        <circle cx="28" cy="28" r="22" fill="none" stroke="#d0c8be" stroke-width="2" stroke-dasharray="5 3"/>
      </svg>`;
    }
    return `<svg width="56" height="56" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
      <circle cx="40" cy="40" r="36" fill="none" stroke="${color}" stroke-width="4" opacity="0.9"/>
      <circle cx="40" cy="40" r="29" fill="none" stroke="${color}" stroke-width="1.5" opacity="0.7"/>
      <circle cx="40" cy="40" r="27" fill="${color}" opacity="0.12"/>
      <text x="40" y="47" text-anchor="middle" font-family="serif" font-size="22" fill="${color}" font-weight="700" opacity="0.9">乗</text>
    </svg>`;
  }

  async function showStampPopup(modelValue, postedNumber) {
    if (!modelValue) return;

    const [numberData, rideData] = await Promise.all([
      fetch(NUMBER_URL).then(r => r.json()),
      fetch(RIDES_URL).then(r => r.json())
    ]);

    // All formations for this model (exclude ***)
    const formations = numberData
      .filter(r => r["車両形式"] === modelValue && !String(r["車番"] || "").includes("*"))
      .map(r => r["車番"]);

    // My rides for this model (including the just-posted one)
    const myRides = rideData.filter(r =>
      r["ユーザー名"] === username && r["車両形式"] === modelValue
    );
    const riddenSet = new Set(myRides.map(r => r["車番"]));
    // Also count the just-posted one as ridden
    riddenSet.add(postedNumber);

    // Check if first time riding this number
    const prevRides = myRides.filter(r => r["車番"] === postedNumber);
    const isFirst = prevRides.length === 0;

    // Get color index based on model order in full number data
    const allModels = [...new Set(numberData.map(r => r["車両形式"]))];
    const colorIdx = allModels.indexOf(modelValue) % STAMP_COLORS.length;
    const color = STAMP_COLORS[colorIdx];

    // Render
    document.getElementById("spModelName").textContent = modelValue;
    document.getElementById("spMsg").textContent = isFirst
      ? `🎉 ${postedNumber} は初乗車！`
      : `🚆 ${postedNumber}編成の乗車回数：${prevRides.length} 回`;
    document.getElementById("spMsg").className = "stamp-popup-msg " + (isFirst ? "first" : "again");

    const grid = document.getElementById("spGrid");
    grid.innerHTML = "";

    formations.forEach(num => {
      const isRidden = riddenSet.has(num);
      const isNew = num === postedNumber;
      const cell = document.createElement("div");
      cell.className = "stamp-popup-cell" + (isNew ? " highlight" : "");
      cell.innerHTML = `
        <div class="sp-circle">${stampSVGSmall(color, isRidden)}</div>
        <div class="sp-label">${num}</div>
      `;
      grid.appendChild(cell);
    });

    document.getElementById("stampPopupOverlay").classList.add("show");
  }

  function setCurrentDateTime() {
    const now = new Date();
    const year = now.getFullYear();
    const month = String(now.getMonth() + 1).padStart(2, "0");
    const day = String(now.getDate()).padStart(2, "0");
    const hours = String(now.getHours()).padStart(2, "0");
    const minutes = String(now.getMinutes()).padStart(2, "0");
    const localDatetime = `${year}-${month}-${day}T${hours}:${minutes}`;

    document.getElementById("departing_time").value = localDatetime;
    setAreaByLocation();
  }

  async function setAreaByLocation() {
    const areaSelect = document.getElementById("area");
    const areas = ["北海道", "東北", "関東", "北陸", "東海", "関西", "中国", "四国", "九州"];
    areaSelect.innerHTML = areas.map(a => `<option value="${a}">${a}</option>`).join("");

    if (!navigator.geolocation) return;

    navigator.geolocation.getCurrentPosition(async pos => {
      const lat = pos.coords.latitude;
      const lon = pos.coords.longitude;

      try {
        const res = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json&accept-language=ja`);
        const data = await res.json();
        const address = data.address;
        const pref = address.state || address.region || address.province || "";

        const regionMap = {
          "北海道": "北海道",
          "青森県": "東北", "岩手県": "東北", "宮城県": "東北", "秋田県": "東北", "山形県": "東北", "福島県": "東北",
          "茨城県": "関東", "栃木県": "関東", "群馬県": "関東", "埼玉県": "関東", "千葉県": "関東", "東京都": "関東", "神奈川県": "関東",
          "新潟県": "北陸", "富山県": "北陸", "石川県": "北陸", "福井県": "北陸",
          "山梨県": "東海", "長野県": "東海", "岐阜県": "東海", "静岡県": "東海", "愛知県": "東海",
          "三重県": "関西", "滋賀県": "関西", "京都府": "関西", "大阪府": "関西", "兵庫県": "関西", "奈良県": "関西", "和歌山県": "関西",
          "鳥取県": "中国", "島根県": "中国", "岡山県": "中国", "広島県": "中国", "山口県": "中国",
          "徳島県": "四国", "香川県": "四国", "愛媛県": "四国", "高知県": "四国",
          "福岡県": "九州", "佐賀県": "九州", "長崎県": "九州", "熊本県": "九州", "大分県": "九州", "宮崎県": "九州", "鹿児島県": "九州", "沖縄県": "九州"
        };

        const selectedArea = regionMap[pref] || "";
        if (selectedArea) {
          areaSelect.value = selectedArea;
        }
        alert(pref)
      } catch (e) {
        console.error("逆ジオコーディング失敗:", e);
      }
    });
  }
</script>

</body>
</html>
